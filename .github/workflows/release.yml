name: release

# Publishes to npm when a version tag is pushed. Publishing happens ONLY here,
# never from a laptop: `--provenance` attests the exact source commit and
# workflow, and the prepublishOnly tarball guard blocks stray files.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm --provenance (Sigstore attestation via OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ${PKG_VERSION}" >&2
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --isolate --timeout 30000

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # npm runs prepublishOnly first: clean rebuild + tarball-content guard.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
