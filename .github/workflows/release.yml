name: release

# Publishes to npm when a version tag is pushed. Publishing happens ONLY here,
# never from a laptop: `--provenance` attests the exact source commit and
# workflow, and the prepublishOnly tarball guard blocks stray files.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release after a successful publish
  id-token: write # npm --provenance (Sigstore attestation via OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json ${PKG_VERSION}" >&2
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test --isolate --timeout 30000

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Tokenless: npm authenticates via the Trusted Publisher (OIDC) configured
      # on npmjs.com for this repo + workflow. Requires npm >= 11.5 (Node 24
      # bundles it) and the id-token: write permission above. npm runs
      # prepublishOnly first: clean rebuild + tarball-content guard.
      - run: npm publish --provenance --access public

      # Only after a successful publish: the GitHub Release for the sidebar,
      # with notes generated from the commits since the previous tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
